name: Check custom-model-settings

on:
  push:
    branches:
      - feature/custom-model-settings
  pull_request:
    branches:
      - feature/custom-model-settings

jobs:
  cargo-check:
    name: cargo check (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # rust-toolchain.toml pins 1.92.0 which is not yet released.
      # We override to the latest stable so cargo check can run.
      - name: Install Rust toolchain (stable override)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt,clippy

      - name: Override toolchain for this workspace
        run: rustup override set stable

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: cargo check
        run: cargo check -p warp 2>&1
